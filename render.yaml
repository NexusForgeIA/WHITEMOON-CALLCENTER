services:
  - type: web
    name: whitemoon-callcenter
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PANEL_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Requerida por /api/llamar (proxy server-side a la Edge Function
      # bland-outbound). Sin ella el lanzamiento de llamadas devuelve 500.
      - key: BLAND_WEBHOOK_URL
        sync: false
      # Requerida por el KPI de crédito del dashboard (GET /v1/me). Sin ella
      # la tarjeta muestra "—" y no aparece el banner de saldo bajo.
      - key: BLAND_API_KEY
        sync: false
      # Retell AI: las consume la Edge Function retell-outbound. Deben estar
      # ADEMÁS en Supabase Edge Function Secrets (la función las lee con
      # Deno.env.get); aquí quedan declaradas para el entorno del proyecto.
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_PHONE_NUMBER
        sync: false
